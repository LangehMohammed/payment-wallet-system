services:
  payment-system-db:
    image: postgres:16
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: nest
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nest']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - payment-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  payment-system-cache:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  payment-system-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@payment-system-db:5432/nest?schema=public
      REDIS_HOST: payment-system-cache
      REDIS_PORT: 6379
    depends_on:
      payment-system-db:
        condition: service_healthy
      payment-system-cache:
        condition: service_healthy
    networks:
      - payment-network
    command: sh -c "npx prisma migrate deploy && node dist/main"

networks:
  payment-network:

volumes:
  postgres-data:
